<!DOCTYPE html>
<html>
<head>
<title>FHA cookie test</title>
<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/cookieconsent@3/build/cookieconsent.min.css" />
</head>
<body>

<h1>Hello</h1>
Content updated!!!

status included!


<script src="https://cdn.jsdelivr.net/npm/cookieconsent@3/build/cookieconsent.min.js" data-cfasync="false"></script>
<script>
  // Define the gtag() API
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments)};

  // Call default commands with static settings to fall back on.
  // Consent commands must appear before gtag.js or Google Tag Manager is loaded
  gtag('consent', 'default', {
	  'ad_storage': 'denied',
	  'analytics_storage': 'denied',
	  'wait_for_update': 500
  });
  
  function updateConsent(status) {
		console.log("status" + status);
	if (this.hasConsented()) {
	  console.log("has consented")
	} else {
	  console.log("no consent")
	}
	gtag('consent', 'update', {
	  'analytics_storage': this.hasConsented() ? 'granted' : 'denied'
	});
  }
  
  window.cookieconsent.initialise({
	"palette": {
	  "popup": {
		"background": "#000"
	  },
	  "button": {
		"background": "#f1d600"
	  }
	},
	"theme": "classic",
	"position": "bottom-right",
	"type": "opt-in",
	"onStatusChange": updateConsent,
	"onInitialise": updateConsent
  });
</script>

<!-- Load gtag.js as normal -->
<script async src="https://www.googletagmanager.com/gtag/js?id=UA-180724753-1">
</script>

<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'UA-180724753-1');
</script>

</body>
</html>
